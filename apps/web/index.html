<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>GoalPulse Agent</title>
    <style>
      /* Static boot splash: rendered before the app bundle parses/hydrates,
         so a fresh load or hard refresh never shows a blank page. Values
         are hardcoded to match apps/web/src/styles/tokens.css on purpose -
         this markup exists outside the Tailwind/React load order, so it
         can't reference the theme tokens directly. Keep these in sync if
         --color-canvas / --color-accent ever change. */
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse 900px 600px at 50% 42%, rgba(255, 159, 28, 0.07), transparent 65%),
          #090c10;
        transition: opacity 0.4s ease;
      }
      #boot-splash.boot-splash-hide {
        opacity: 0;
        pointer-events: none;
      }
      .boot-grid {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px);
        background-size: 28px 28px;
        -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, black 40%, transparent 85%);
        mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, black 40%, transparent 85%);
      }
      .boot-corner {
        position: absolute;
        width: 22px;
        height: 22px;
        border-color: rgba(158, 196, 224, 0.18);
        border-style: solid;
      }
      .boot-corner.tl {
        top: 28px;
        left: 28px;
        border-width: 2px 0 0 2px;
      }
      .boot-corner.tr {
        top: 28px;
        right: 28px;
        border-width: 2px 2px 0 0;
      }
      .boot-corner.bl {
        bottom: 28px;
        left: 28px;
        border-width: 0 0 2px 2px;
      }
      .boot-corner.br {
        bottom: 28px;
        right: 28px;
        border-width: 0 2px 2px 0;
      }
      .boot-content {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
      }
      .boot-mark-wrap {
        position: relative;
        width: 96px;
        height: 84px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .boot-glow {
        position: absolute;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 159, 28, 0.22), transparent 70%);
        filter: blur(6px);
        animation: boot-breathe 2.6s ease-in-out infinite;
      }
      @keyframes boot-breathe {
        0%,
        100% {
          opacity: 0.55;
          transform: scale(0.94);
        }
        50% {
          opacity: 1;
          transform: scale(1.05);
        }
      }
      .boot-mark {
        position: relative;
        width: 96px;
        height: auto;
        overflow: visible;
      }
      .boot-word {
        text-align: center;
      }
      .boot-title {
        margin: 0;
        font-family: "Space Grotesk", "Inter", system-ui, sans-serif;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: -0.3px;
        color: #ffffff;
      }
      .boot-tag {
        margin: 4px 0 0;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-weight: 600;
        font-size: 11px;
        letter-spacing: 2px;
        color: #ff9f1c;
      }
      .boot-status {
        margin: 0;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #6b7280;
        transition: opacity 0.2s ease;
      }
      .boot-bar-track {
        position: relative;
        width: 180px;
        height: 3px;
        overflow: hidden;
        border-radius: 2px;
        background: #1b232c;
      }
      .boot-bar-fill {
        position: absolute;
        inset-block: 0;
        left: 0;
        width: 33%;
        border-radius: 2px;
        background: #ff9f1c;
        animation: boot-loading-bar 1.6s ease-in-out infinite;
      }
      @keyframes boot-loading-bar {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(300%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-glow,
        .boot-bar-fill {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-grid"></div>
      <div class="boot-corner tl"></div>
      <div class="boot-corner tr"></div>
      <div class="boot-corner bl"></div>
      <div class="boot-corner br"></div>
      <div class="boot-content">
        <div class="boot-mark-wrap">
          <div class="boot-glow"></div>
          <svg class="boot-mark" viewBox="0 0 230 200" xmlns="http://www.w3.org/2000/svg">
            <path
              id="boot-ring"
              d="M 165.98,83.55 A 68,68 0 1 1 165.98,116.45"
              fill="none"
              stroke="#ff9f1c"
              stroke-width="9.5"
              stroke-linecap="round"
            />
            <path
              id="boot-pulse"
              d="M 32,100 L 60,100 L 73,74 L 87,128 L 101,52 L 115,128 L 129,100 L 196,100"
              fill="none"
              stroke="#ff9f1c"
              stroke-width="9.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <circle cx="199" cy="100" r="9.5" fill="#ff9f1c" />
          </svg>
        </div>
        <div class="boot-word">
          <p class="boot-title">GOALPULSE</p>
          <p class="boot-tag">COMMAND CENTER</p>
        </div>
        <p class="boot-status" id="boot-status">Connecting to odds stream</p>
        <div class="boot-bar-track"><div class="boot-bar-fill"></div></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var messages = [
          "Connecting to odds stream",
          "Normalizing fixtures",
          "Running signal engine",
          "Auditing evidence chain",
        ];
        var i = 0;
        var statusEl = document.getElementById("boot-status");
        if (statusEl) {
          setInterval(function () {
            i = (i + 1) % messages.length;
            statusEl.style.opacity = "0";
            setTimeout(function () {
              statusEl.textContent = messages[i];
              statusEl.style.opacity = "1";
            }, 200);
          }, 1400);
        }
        try {
          var ring = document.getElementById("boot-ring");
          var pulse = document.getElementById("boot-pulse");
          var reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          if (ring && pulse && !reduced) {
            [ring, pulse].forEach(function (p) {
              var len = p.getTotalLength();
              p.style.strokeDasharray = String(len);
              p.style.strokeDashoffset = String(len);
            });
            ring.getBoundingClientRect();
            requestAnimationFrame(function () {
              ring.style.transition = "stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)";
              pulse.style.transition = "stroke-dashoffset 0.9s cubic-bezier(.4,0,.2,1) 0.3s";
              ring.style.strokeDashoffset = "0";
              pulse.style.strokeDashoffset = "0";
            });
          }
        } catch (err) {
          // No real SVG geometry support - static mark is still fine.
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
